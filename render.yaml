services:
  - type: web
    name: threadwise
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_CONNECTION_LIMIT
        value: "3"
      - key: DATABASE_POOL_TIMEOUT_SECONDS
        value: "30"
      - key: SUPABASE_RUNTIME_POOL_MODE
        value: auto
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_MODEL_FALLBACKS
        value: gpt-5.5,gpt-5.4,gpt-5.4-nano
      - key: ADMIN_STATUS_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET_PATH
        value: /telegram/webhook
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALENDAR_REDIRECT_URI
        sync: false
      - key: GOOGLE_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        sync: false
      - key: MICROSOFT_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: DEFAULT_TIMEZONE
        value: Asia/Singapore
      - key: DEFAULT_REMINDER_INTERVAL_MINUTES
        value: "180"
      - key: BOT_ALLOWED_TELEGRAM_IDS
        sync: false
