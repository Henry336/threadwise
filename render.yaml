services:
  - type: web
    name: threadwise
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_MODEL_FALLBACKS
        value: gpt-5.5,gpt-5.4,gpt-5.4-nano
      - key: ADMIN_STATUS_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET_PATH
        value: /telegram/webhook
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GMAIL_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        sync: false
      - key: MICROSOFT_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: GMAIL_SCAN_POLL_MS
        value: "900000"
      - key: GMAIL_DAILY_SCAN_HOUR
        value: "8"
      - key: GMAIL_MAX_UNREAD_PER_SCAN
        value: "10"
      - key: DEFAULT_TIMEZONE
        value: Asia/Singapore
      - key: DEFAULT_REMINDER_INTERVAL_MINUTES
        value: "180"
      - key: BOT_ALLOWED_TELEGRAM_IDS
        sync: false
