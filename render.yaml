services:
  - type: web
    name: threadwise
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: threadwise-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET_PATH
        value: /telegram/webhook
      - key: DEFAULT_TIMEZONE
        value: Asia/Singapore
      - key: DEFAULT_REMINDER_INTERVAL_MINUTES
        value: "180"
      - key: BOT_ALLOWED_TELEGRAM_IDS
        sync: false

databases:
  - name: threadwise-db
    plan: starter
